name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'v1.0.0'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install rich colorama pyinstaller

      - name: EXE 빌드
        run: |
          cd 개발
          pyinstaller --onefile `
            --name="PROTOCOL_STIGMA" `
            --icon="Protocol_Stigma_1.ico" `
            --add-data "database.json;." `
            --add-data "master_formulas.json;." `
            Main.py

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "PROTOCOL: STIGMA ${{ github.event.inputs.version }} - 1막: 낙인"
          body: |
            Windows 64비트 실행 파일입니다.
            다운로드 후 바로 실행 가능합니다. (Python 설치 불필요)
          files: 개발/dist/PROTOCOL_STIGMA.exe
          draft: false
